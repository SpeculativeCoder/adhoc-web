<div class="container-xxl">
  <h2>
    Objective {{ objective().id }}
  </h2>
  <form>
    <div class="mb-3">
      <label class="form-label" for="nameInput">Name</label>
      <input class="form-control" id="nameInput" name="name" type="text" readonly
             [(ngModel)]="objective().name"/>
    </div>
    <div class="mb-3">
      <label class="form-label" for="regionInput">Region</label>
      <input class="form-control" id="regionInput" name="region" type="number" readonly
             [(ngModel)]="objective().regionId"/>
    </div>
    <div class="mb-3">
      <label class="form-label" for="indexInput">Index</label>
      <input class="form-control" id="indexInput" name="index" type="number" readonly
             [(ngModel)]="objective().index"/>
    </div>
    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label" for="xInput">X</label>
        <input class="form-control" id="xInput" name="x" type="number" readonly
               [(ngModel)]="objective().x"/>
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label" for="yInput">Y</label>
        <input class="form-control" id="yInput" name="y" type="number" readonly
               [(ngModel)]="objective().y"/>
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label" for="zInput">Z</label>
        <input class="form-control" id="zInput" name="z" type="number" readonly
               [(ngModel)]="objective().z"/>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label" for="areaInput">Area</label>
      <input class="form-control" id="areaInput" name="area" type="number" readonly
             [(ngModel)]="objective().areaId"/>
    </div>
    <div class="mb-3">
      <label class="form-label" for="linkedObjectives">Linked Objectives</label>
      <input class="form-control" id="linkedObjectives" name="linkedObjectives" type="text" readonly
             [ngModel]="objective().linkedObjectiveIds"/>
    </div>
    <div class="mb-3">
      @if ((currentUser()?.roles || []).indexOf("ADMIN") == -1) {
        <label class="form-label" for="factionInput">Faction</label>
        <input class="form-control" id="factionInput" name="faction" type="text" readonly
               [ngModel]="faction(objective().factionId)()?.name"/>
      } @else {
        <label class="form-label" for="factionDropdown">Faction</label>
        <div ngbDropdown>
          <button type="button" class="btn btn-outline-secondary" id="factionDropdown" ngbDropdownToggle>
            <span [ngStyle]="{'color': faction(objective().factionId)()?.color }"><span class="oi oi-media-stop"></span></span>
            <span class="text-body"> {{ faction(objective().factionId)()?.name }}</span>
          </button>
          <div ngbDropdownMenu aria-labelledby="factionDropdown">
            @for (faction of factions(); track faction.id) {
              <button type="button" ngbDropdownItem
                      [ngClass]="{ active: faction.id === objective().factionId }" (click)="setObjectiveFaction(objective, faction)">
                <span [ngStyle]="{'color': faction.color}"><span class="oi oi-media-stop"></span></span>
                <span class="text-body"> {{ faction.name }}</span>
              </button>
            }
          </div>
        </div>
      }
    </div>
    <div class="row">
      @if ((currentUser()?.roles || []).indexOf("ADMIN") != -1) {
        <div class="col-auto mt-3 mb-3">
          <button class="btn btn-primary" type="button" (click)="save()">Save</button>
        </div>
      }
      <div class="col-auto mt-3 mb-3">
        <button class="btn btn-secondary" type="button" (click)="back()">Back</button>
      </div>
    </div>
  </form>
</div>
